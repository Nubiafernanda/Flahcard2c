<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css" />
    <title>Conecta Aí</title>
</head>
<body>
    <header class="cabecalho">
        <h1>Confere Aí</h1>
        <nav>
            <a href="#" class="cabecalho-link">Inicio</a>
        </nav>
    </header>
    <main>
        <h2>Descubra a verdade passando o mouse</h2>
        <section>
        <article class="cartao">
            <div class="cartao-interno">
                <div class="cartao-frente">
                    <img src="https://static.wikia.nocookie.net/marveldatabase/images/d/d1/Miles_Morales_Spider-Man_Vol_2_1_Textless.jpg/revision/latest/scale-to-width-down/1200?cb=20220928215204"alt="Miles_Morales_Spider-Man_Vol_2_1_Textless" class="cartao-imagem">
                    <p>milles salvas a cidade!</p>
                </div>
                <div class="cartao-verso">
                    <img src="https://upload.wikimedia.org/wikipedia/pt/7/73/Miles_Morales.jpg" alt="milles"  class="cartao-imagem">
                    <p>o futuro aguarda pelo milles, trazendo varias surpresas.</p>
                </div>
            </div>
        </article>
<article class="cartao">
            <div class="cartao-interno">
                <div class="cartao-frente">
                    <img src="https://preview.redd.it/miles-and-gwens-relationship-in-spiderverse-movies-them-in-v0-d57q6385vvib1.jpg?width=640&crop=smart&auto=webp&s=2f097d55e7dde8194406e3d590b2e10700950adf"
                     alt="milles" class="cartao-imagem">
                
                    <p>ele e apaixona e descobre que tem varios homens aranhas pelo multivrso!</p>
                </div>
                <div class="cartao-verso">
                    <img src="https://i.ytimg.com/vi/PgKF19sUyiI/hq720.jpg?sqp=-oaymwEhCK4FEIIDSFryq4qpAxMIARUAAAAAGAElAADIQj0AgKJD&rs=AOn4CLADLA3UCUxIpOHMvHcuZHt8yLqh3g" alt="Miles_Morales"  class="cartao-imagem">
                    <p>ele descobre que foi um erro.</p>
                </div>
            </div>
        </article>

        </section>
    </main>
    <footer>
        <p>Projeto feito por núbia</p>
    </footer>
</body>
</html>
